<!DOCTYPE html>
<html>
<head>
  <title>RFQs</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }
    .navbar { background: #4f46e5; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
    .navbar a { color: white; text-decoration: none; margin-left: 20px; }
    .content { padding: 30px; }
    .form-box { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; }
    input, textarea { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 250px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="navbar">
    <b>VendorBridge</b>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="vendors.html">Vendors</a>
      <a href="quotations.html">Quotations</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>
  <div class="content">
    <h2>RFQ Management</h2>
    <div class="form-box">
      <h3>Create RFQ</h3>
      <input id="title" placeholder="RFQ Title"/><br>
      <textarea id="description" placeholder="Description" rows="3"></textarea><br>
      <input id="quantity" type="number" placeholder="Quantity"/>
      <input id="deadline" type="datetime-local"/>
      <input id="vendor_ids" placeholder="Vendor IDs (e.g. 1,2,3)"/>
      <br>
      <button onclick="createRFQ()">Create RFQ</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Deadline</th><th>Action</th></tr></thead>
      <tbody id="rfq-list"></tbody>
    </table>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function createRFQ() {
      const vendor_ids = document.getElementById("vendor_ids").value.split(",").map(Number);
      const res = await apiFetch("/rfqs/", "POST", {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        quantity: parseInt(document.getElementById("quantity").value),
        deadline: new Date(document.getElementById("deadline").value).toISOString(),
        vendor_ids
      });
      alert(res.message || JSON.stringify(res));
      loadRFQs();
    }
    async function loadRFQs() {
      const rfqs = await apiFetch("/rfqs/");
      document.getElementById("rfq-list").innerHTML = rfqs.map(r => `
        <tr>
          <td>${r.id}</td><td>${r.title}</td>
          <td>${r.status}</td><td>${new Date(r.deadline).toLocaleDateString()}</td>
          <td><a href="quotations.html?rfq_id=${r.id}">View Quotes</a></td>
        </tr>`).join("");
    }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadRFQs();
  </script>
</body>
</html>
