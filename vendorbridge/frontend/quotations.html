<!DOCTYPE html>
<html>
<head>
  <title>Quotations</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }
    .navbar { background: #4f46e5; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
    .navbar a { color: white; text-decoration: none; margin-left: 20px; }
    .content { padding: 30px; }
    .form-box { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; }
    input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    .lowest { background: #dcfce7; }
  </style>
</head>
<body>
  <div class="navbar">
    <b>VendorBridge</b>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="rfq.html">RFQs</a>
      <a href="approvals.html">Approvals</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>
  <div class="content">
    <h2>Quotations</h2>
    <div class="form-box">
      <h3>Submit Quotation</h3>
      <input id="rfq_id" type="number" placeholder="RFQ ID"/>
      <input id="vendor_id" type="number" placeholder="Vendor ID"/>
      <input id="unit_price" type="number" placeholder="Unit Price"/>
      <input id="total_price" type="number" placeholder="Total Price"/>
      <input id="delivery_days" type="number" placeholder="Delivery Days"/>
      <input id="notes" placeholder="Notes"/>
      <br>
      <button onclick="submitQuotation()">Submit Quotation</button>
    </div>
    <h3>Compare Quotations</h3>
    <input id="compare_rfq_id" type="number" placeholder="RFQ ID"/>
    <button onclick="compareQuotations()">Compare</button>
    <table>
      <thead><tr><th>Vendor</th><th>Unit Price</th><th>Total Price</th><th>Delivery Days</th><th>Notes</th></tr></thead>
      <tbody id="quote-list"></tbody>
    </table>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function submitQuotation() {
      const res = await apiFetch("/quotations/", "POST", {
        rfq_id: parseInt(document.getElementById("rfq_id").value),
        vendor_id: parseInt(document.getElementById("vendor_id").value),
        unit_price: parseFloat(document.getElementById("unit_price").value),
        total_price: parseFloat(document.getElementById("total_price").value),
        delivery_days: parseInt(document.getElementById("delivery_days").value),
        notes: document.getElementById("notes").value
      });
      alert(res.id ? "Quotation submitted!" : JSON.stringify(res));
    }
    async function compareQuotations() {
      const rfq_id = document.getElementById("compare_rfq_id").value;
      const quotes = await apiFetch(`/quotations/compare/${rfq_id}`);
      document.getElementById("quote-list").innerHTML = quotes.map((q, i) => `
        <tr class="${i===0?'lowest':''}">
          <td>${q.vendor} ${i===0?'🏆 Lowest':''}</td>
          <td>₹${q.unit_price}</td><td>₹${q.total_price}</td>
          <td>${q.delivery_days} days</td><td>${q.notes}</td>
        </tr>`).join("");
    }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
  </script>
</body>
</html>
