<!DOCTYPE html>
<html>
<head>
  <title>Approvals</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }
    .navbar { background: #4f46e5; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
    .navbar a { color: white; text-decoration: none; margin-left: 20px; }
    .content { padding: 30px; }
    .form-box { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; }
    input, select, textarea { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 250px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    .approve { background: #16a34a; }
    .reject { background: #dc2626; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="navbar">
    <b>VendorBridge</b>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="quotations.html">Quotations</a>
      <a href="purchase_orders.html">POs</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>
  <div class="content">
    <h2>Approval Workflow</h2>
    <div class="form-box">
      <h3>Process Approval</h3>
      <input id="quotation_id" type="number" placeholder="Quotation ID"/>
      <textarea id="remarks" placeholder="Remarks"></textarea><br>
      <button class="approve" onclick="processApproval('approved')">✅ Approve</button>
      <button class="reject" onclick="processApproval('rejected')">❌ Reject</button>
    </div>
    <h3>Approval History</h3>
    <table>
      <thead><tr><th>Quotation ID</th><th>Status</th><th>Remarks</th><th>Reviewed At</th></tr></thead>
      <tbody id="approval-list"></tbody>
    </table>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function processApproval(status) {
      const res = await apiFetch("/approvals/", "POST", {
        quotation_id: parseInt(document.getElementById("quotation_id").value),
        status,
        remarks: document.getElementById("remarks").value
      });
      alert(res.message || JSON.stringify(res));
      loadApprovals();
    }
    async function loadApprovals() {
      const approvals = await apiFetch("/approvals/");
      document.getElementById("approval-list").innerHTML = approvals.map(a => `
        <tr>
          <td>${a.quotation_id}</td>
          <td style="color:${a.status==='approved'?'green':a.status==='rejected'?'red':'orange'}">${a.status}</td>
          <td>${a.remarks || '-'}</td>
          <td>${a.reviewed_at ? new Date(a.reviewed_at).toLocaleString() : '-'}</td>
        </tr>`).join("");
    }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadApprovals();
  </script>
</body>
</html>
