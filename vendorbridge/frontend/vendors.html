<!DOCTYPE html>
<html>
<head>
  <title>Vendors</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }
    .navbar { background: #4f46e5; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
    .navbar a { color: white; text-decoration: none; margin-left: 20px; }
    .content { padding: 30px; }
    .form-box { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; }
    input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="navbar">
    <b>VendorBridge</b>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="rfq.html">RFQs</a>
      <a href="invoices.html">Invoices</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>
  <div class="content">
    <h2>Vendor Management</h2>
    <div class="form-box">
      <h3>Add Vendor</h3>
      <input id="name" placeholder="Vendor Name"/>
      <input id="email" placeholder="Email"/>
      <input id="phone" placeholder="Phone"/>
      <input id="category" placeholder="Category"/>
      <input id="gst" placeholder="GST Number"/>
      <br>
      <button onclick="addVendor()">Add Vendor</button>
    </div>
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Category</th><th>GST</th><th>Status</th></tr></thead>
      <tbody id="vendor-list"></tbody>
    </table>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function addVendor() {
      const res = await apiFetch("/vendors/", "POST", {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        category: document.getElementById("category").value,
        gst_number: document.getElementById("gst").value
      });
      alert(res.name ? "Vendor added!" : JSON.stringify(res));
      loadVendors();
    }
    async function loadVendors() {
      const vendors = await apiFetch("/vendors/");
      document.getElementById("vendor-list").innerHTML = vendors.map(v => `
        <tr>
          <td>${v.name}</td><td>${v.email}</td><td>${v.phone}</td>
          <td>${v.category}</td><td>${v.gst_number}</td>
          <td><span style="color:${v.status==='active'?'green':'red'}">${v.status}</span></td>
        </tr>`).join("");
    }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadVendors();
  </script>
</body>
</html>
